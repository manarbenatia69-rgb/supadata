<script>

document.addEventListener("DOMContentLoaded", function() {
  function handleFileInput(input, container, clearButton, addButton) {
    input.addEventListener("change", function() {
      const file = input.files[0];
      if (file) {
        const reader = new FileReader();

        reader.onload = function(e) {
          const img = new Image();
          img.src = e.target.result;
          img.style.maxWidth = "100%";
          container.innerHTML = "";
          container.appendChild(img);
          container.style.display = "block";
          clearButton.style.display = "block";
          addButton.style.display = "none";
        };

        reader.readAsDataURL(file);
      }
    });

    clearButton.addEventListener("click", function() {
      input.value = "";
      container.innerHTML = "";
      container.style.display = "none";
      clearButton.style.display = "none";
      addButton.style.display = "block";
    });
  }

  // Pour le champ "Profile Picture"
  handleFileInput(
    document.getElementById("profilePictureInput"),
    document.getElementById("profilePictureContainer"),
    document.getElementById("clearProfilePictureButton"),
    document.querySelector(".file-upload-label")
  );

  // Pour le champ "Company Logo"
  handleFileInput(
    document.getElementById("companyLogoInput"),
    document.getElementById("companyLogoContainer"),
    document.getElementById("clearCompanyLogoButton"),
    document.querySelectorAll(".file-upload-label")[1]
  );

  // Pour le champ "Cover photo"
  handleFileInput(
    document.getElementById("coverPhotoInput"),
    document.getElementById("coverPhotoContainer"),
    document.getElementById("clearCoverPhotoButton"),
    document.querySelectorAll(".file-upload-label")[2]
  );
});

</script>

<script>
  $(document).ready(function() {
    // Sélectionnez le champ input avec son ID
    var input = document.querySelector("#phone");

    // Initialisez la bibliothèque intlTelInput sur le champ input avec les États-Unis comme pays initial
    var iti = window.intlTelInput(input, {
      utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.12/js/utils.js",
      initialCountry: "us", // Les États-Unis comme pays initial
      nationalMode: false, // Afficher le code de pays au format "+XXX"
      separateDialCode: false, // Séparer le code de pays du numéro
      autoPlaceholder: "aggressive" // Ajouter automatiquement le préfixe
    });

    // Gérez les événements (par exemple, sélection de code de pays)
    input.addEventListener("countrychange", function() {
      var selectedCountryData = iti.getSelectedCountryData();
      var dialCode = selectedCountryData.dialCode;
      input.value = "+" + dialCode; // Mettez à jour la valeur du champ
    });
  });
</script>
