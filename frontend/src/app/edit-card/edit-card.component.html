<!DOCTYPE html>
<header>
    <a class="rbk-register-hero__home" routerLink="/fichiercsv">&larr; Président</a>
</header>

<body>
<div class="wrapper">
  <div id="content-page" class="content-page">
    <div class="container-fluid">
      
      <div class="row" *ngIf="u">
        <div class="col-sm-12">
          <div class="container update-profile-container">
            <div class="row gutters">

              <div class="col-xl-3 col-lg-3 col-md-12">
                <div class="card profile-card-left">
                  <div class="card-body text-center">
                    <div class="user-avatar mb-3">
                      <img [src]="'/assets/uploads/' + userType + '/' + (u.profilepicture || 'user.png')" 
                           class="profile-img img-fluid rounded-circle" alt="user">
                    </div>
                    <h5 class="user-name">{{ u.nom }} {{ u.prenom }}</h5>
                    <h6 class="text-muted">{{ userType | uppercase }}</h6>
                  </div>
                </div>
              </div>

              <div class="col-xl-9 col-lg-9 col-md-12">
                <div class="card profile-card-right">
                  <form [formGroup]="updateForm" (ngSubmit)="updateUser()">
                    <div class="card-body">
                      <h5 class="section-title mb-4">Modifier la carte de visite</h5>
                      
                      <div class="row">
                        <div class="col-md-6 mb-3">
                          <label>Nom</label>
                          <input formControlName="nom" type="text" class="form-control">
                        </div>
                        <div class="col-md-6 mb-3">
                          <label>Prénom</label>
                          <input formControlName="prenom" type="text" class="form-control">
                        </div>
                        <div class="col-md-6 mb-3">
                          <label>Email</label>
                          <input formControlName="email" type="email" class="form-control">
                        </div>
                        <div class="col-md-6 mb-3">
                          <label>Job Title</label>
                          <input formControlName="jobtitle" type="text" class="form-control" placeholder="Exp: Developer">
                        </div>
                        <div class="col-md-6 mb-3">
                          <label>Téléphone</label>
                          <input formControlName="telephone" type="text" class="form-control">
                        </div>
                        <div class="col-md-6 mb-3">
                          <label>Adresse</label>
                          <input formControlName="adresse" type="text" class="form-control">
                        </div>
                        <div class="col-md-12 mb-3">
                          <label>Nouveau mot de passe (optionnel)</label>
                          <input formControlName="pwd" type="password" class="form-control">
                        </div>
                      </div>

                      <div class="form-buttons mt-4 text-end">
                        <button type="button" class="btn btn-light me-2">Annuler</button>
                        <button type="submit" class="btn-save" >
                          Enregistrer les modifications
                        </button>
                      </div>
                    </div>
                  </form>
                </div>
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>
  </div>


</div>
  
</body>
