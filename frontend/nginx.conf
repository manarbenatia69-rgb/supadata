server {
    listen 80;
    server_name localhost;

    # 1. المجلد اللي فيه ملفات الـ Angular/React
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. الـ Proxy Pass: تحويل أي طلب يبدأ بـ /api إلى الـ Backend
    location /api/ {
        # pfe-backend هو اسم الـ container في الـ docker-compose
        proxy_pass http://pfe-backend:8081/api/;
        
        # إعدادات الـ Headers باش الـ Backend يعرف شكون قاعد يكلم فيه
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # معالجة الـ CORS في الـ Nginx (احتياطاً)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Accept,Content-Type,Origin,Authorization' always;

        # التعامل مع طلبات الـ OPTIONS (Pre-flight requests)
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # تخصيص صفحة الخطأ (اختياري)
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}