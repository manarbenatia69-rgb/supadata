<div class="iq-top-navbar">
  <div class="iq-navbar-custom">
    <nav class="navbar navbar-expand-lg navbar-light p-0">

      <!-- LEFT PART -->
      <div class="iq-menu-bt d-flex align-items-center">
        <div class="wrapper-menu">
          <div class="main-circle">
            <i class="ri-arrow-left-s-line"></i>
          </div>
          <div class="hover-circle">
            <i class="ri-arrow-right-s-line"></i>
          </div>
        </div>

        <div class="iq-navbar-logo d-flex justify-content-between">
          <a routerLink="/dashboard" class="header-logo">
            <img src="assets/images/logo.png"
                 class="img-fluid rounded-normal"
                 alt="">
            <div class="pt-2 pl-2 logo-title">
              <span class="text-danger text-uppercase">
                <span class="text-primary ml-1"></span>
              </span>
            </div>
          </a>
        </div>
      </div>

      <!-- BREADCRUMB -->
      <div class="navbar-breadcrumb">
        <h4 class="mb-0 text-dark"></h4>
        <p class="mb-0">
          <span class="text-danger"></span>
          Great to see you again
        </p>
      </div>

      <!-- TOGGLER -->
      <button class="navbar-toggler" type="button"
              data-toggle="collapse"
              data-target="#navbarSupportedContent">
        <i class="ri-menu-3-line"></i>
      </button>

      <!-- RIGHT PART -->
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav ml-auto navbar-list">

          <!-- SEARCH -->
          <li class="nav-item nav-icon">
            <div class="iq-search-bar">
             <form class="searchbox" (ngSubmit)="search()">
               <input type="text"
                name="search"
        class="text search-input"
       placeholder="Type here to search..."
       [(ngModel)]="searchKeyword"
       (keyup.enter)="search()">
                <span class="search-link">
                  <i class="ri-search-line"></i>
                </span>
              </form>
            </div>
          </li>

          <!-- THEME TOGGLER -->
          <li class="nav-item nav-icon">
            <a href="#" (click)="toggleTheme(); $event.preventDefault()" class="search-toggle iq-waves-effect">
              <i *ngIf="isLightTheme" class="ri-sun-line"></i>
              <i *ngIf="!isLightTheme" class="ri-moon-line"></i>
            </a>
          </li>

          <!-- NOTIFICATIONS -->
          <li class="nav-item nav-icon">
            <a href=""
               (click)="toggleNotifications($event)"
               class="search-toggle iq-waves-effect text-primary rounded">
              <i class="ri-notification-line block"></i>
              <span class="bg-danger dots"></span>
            </a>

            <div class="iq-sub-dropdown"
                 [class.show]="isNotificationsOpen">
              <div class="iq-card shadow-none m-0">
                <div class="iq-card-body p-0">
                  <div class="bg-primary p-3">
                    <h5 class="mb-0 text-white">
                      All Notifications
                      <small class="badge badge-light float-right pt-1">4</small>
                    </h5>
                  </div>

                 

                </div>
              </div>
            </div>
          </li>

        </ul>
      </div>

      <!-- PROFILE -->
      <ul class="navbar-list">
        <li class="line-height">

          <a href=""
             (click)="toggleProfile($event)"
             class="search-toggle iq-waves-effect d-flex align-items-center">
            <img src="assets/images/user/user.png"
                 class="img-fluid rounded-circle"
                 alt="user">
          </a>

          <div class="iq-sub-dropdown iq-user-dropdown"
               [class.show]="isProfileOpen">

            <div class="iq-card shadow-none m-0">
              <div class="iq-card-body p-0">

                <div class="bg-primary p-3">
                  <h5 class="mb-0 text-white line-height">
                   Hello {{this.userDetails.nom }} {{this.userDetails.prenom }}
                  </h5>
                  <span class="text-white font-size-12">
                    disponible
                  </span>
                </div>

                <a href="profil/{{userDetails.id}}"
                   class="iq-sub-card iq-bg-primary-hover">
                  <div class="media align-items-center">
                    <div class="rounded iq-card-icon iq-bg-primary">
                      <i class="ri-file-user-line"></i>
                    </div>
                    <div class="media-body ml-3">
                      <h6 class="mb-0">My Profile</h6>
                      <p class="mb-0 font-size-12">
                        View personal profile details.
                      </p>
                    </div>
                  </div>
                </a>

                <div class="d-inline-block w-100 text-center p-3">
                  <a (click)="logout()"
                     class="bg-primary iq-sign-btn">
                    Deconnexion
                    <i class="ri-login-box-line ml-2"></i>
                  </a>
                </div>

              </div>
            </div>

          </div>
        </li>
      </ul>

    </nav>
  </div>
</div>
