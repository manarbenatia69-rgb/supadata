services:
  db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: supadata
    ports:
      - "3307:3306"

  backend-api:
    build: ./supadata  # <--- thabbet li esm el dossier s'hih houni
    depends_on:
      - db
    ports:
      - "8081:8081"