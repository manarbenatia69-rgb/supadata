version: '3.8'

services:
  # 1. Base de données MySQL
  db:
    image: mysql:8.0
    container_name: pfe-db
    restart: always
    environment:
      MYSQL_DATABASE: supadata_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      # هوني تتسجل الداتا في PC متاعك
      - db_data:/var/lib/mysql
    networks:
      - pfe-network

  # 2. Backend Spring Boot (supadata)
  backend:
    build: ./supadata
    container_name: pfe-backend
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/supadata_db?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    networks:
      - pfe-network

  # 3. Admin Panel (Angular)
  admin:
    build: ./Admin
    container_name: pfe-admin
    ports:
      - "4201:80"
    networks:
      - pfe-network

  # 4. Frontend Client (Angular)
  frontend:
    build: ./frontend
    container_name: pfe-frontend
    ports:
      - "4200:80"
    networks:
      - pfe-network

# صنع الـ Volume لضمان عدم ضياع البيانات
volumes:
  db_data:

networks:
  pfe-network:
    driver: bridge