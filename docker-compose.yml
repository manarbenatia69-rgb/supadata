services:
  db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: supadata
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql  # هذا هو سر الـ Persistence
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - pfe-network

  backend-api:
    build: ./supadata
    container_name: pfetest-backend-api-1
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/supadata?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    networks:
      - pfe-network

networks:
  pfe-network:
    driver: bridge

volumes:
  mysql_data:  # تعريف الـ Volume المستقل