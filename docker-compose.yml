services:
  # 1. الداتابيز
  db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: supadata
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - pfe-network

  # 2. الـ Backend (Spring Boot)
  backend-api:
    build: ./supadata
    container_name: backend-service
    depends_on:
      - db
    ports:
      - "8081:8081"
    networks:
      - pfe-network

  # 3. الـ Admin Template (Angular)
  admin-panel:
    build: ./admin
    container_name: admin-ui
    ports:
      - "4201:80" # يتحل على بورت 4201
    depends_on:
      - backend-api
    networks:
      - pfe-network

  # 4. الـ Frontend Template (Angular)
  client-store:
    build: ./frontend
    container_name: client-ui
    ports:
      - "4200:80" # يتحل على بورت 4200
    depends_on:
      - backend-api
    networks:
      - pfe-network

networks:
  pfe-network:
    driver: bridge

volumes:
  mysql_data: